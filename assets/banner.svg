<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#161b22;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#238636;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#58a6ff" stroke-width="1"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#58a6ff" stroke-width="1"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#58a6ff" stroke-width="1"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="#58a6ff" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#58a6ff" stroke-width="1"/>
    <line x1="800" y1="0" x2="800" y2="300" stroke="#58a6ff" stroke-width="1"/>
    <line x1="1000" y1="0" x2="1000" y2="300" stroke="#58a6ff" stroke-width="1"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accent)" rx="1"/>

  <!-- Pipeline visualization (left side) -->
  <!-- Stage boxes -->
  <g transform="translate(60, 100)">
    <!-- FP16 input -->
    <rect x="0" y="0" width="100" height="50" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
    <text x="50" y="21" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle" opacity="0.8">FP16 KV</text>
    <text x="50" y="38" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">~16 GB</text>
    
    <!-- Arrow -->
    <line x1="105" y1="25" x2="130" y2="25" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <polygon points="128,20 138,25 128,30" fill="#58a6ff" opacity="0.4"/>
    
    <!-- PCA -->
    <rect x="140" y="0" width="80" height="50" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
    <text x="180" y="21" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle" opacity="0.8">PCA</text>
    <text x="180" y="38" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">decorrelate</text>
    
    <!-- Arrow -->
    <line x1="225" y1="25" x2="250" y2="25" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <polygon points="248,20 258,25 248,30" fill="#58a6ff" opacity="0.4"/>
    
    <!-- Quantize -->
    <rect x="260" y="0" width="80" height="50" rx="6" fill="none" stroke="#58a6ff" stroke-width="1.5" opacity="0.6"/>
    <text x="300" y="21" font-family="monospace" font-size="11" fill="#58a6ff" text-anchor="middle" opacity="0.8">DP Quant</text>
    <text x="300" y="38" font-family="monospace" font-size="9" fill="#8b949e" text-anchor="middle">0-16 bits</text>
    
    <!-- Arrow -->
    <line x1="345" y1="25" x2="370" y2="25" stroke="#58a6ff" stroke-width="1.5" opacity="0.4"/>
    <polygon points="368,20 378,25 368,30" fill="#58a6ff" opacity="0.4"/>
    
    <!-- Compressed output -->
    <rect x="380" y="0" width="100" height="50" rx="6" fill="none" stroke="#3fb950" stroke-width="1.5" opacity="0.6"/>
    <text x="430" y="21" font-family="monospace" font-size="11" fill="#3fb950" text-anchor="middle" opacity="0.8">Compressed</text>
    <text x="430" y="38" font-family="monospace" font-size="10" fill="#8b949e" text-anchor="middle">~2 GB</text>
  </g>

  <!-- Title (right side) -->
  <text x="770" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#e6edf3" letter-spacing="-2">KVTC</text>
  <text x="770" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8b949e" font-weight="400">KV-Cache Tensor Compression</text>
  
  <!-- Stats row -->
  <g transform="translate(770, 165)">
    <rect x="0" y="0" width="90" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="45" y="14" font-family="monospace" font-size="13" fill="#3fb950" text-anchor="middle" font-weight="700">6-9x</text>
    <text x="45" y="27" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">compression</text>
    
    <rect x="100" y="0" width="90" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="145" y="14" font-family="monospace" font-size="13" fill="#58a6ff" text-anchor="middle" font-weight="700">0.996</text>
    <text x="145" y="27" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">cosine sim</text>
    
    <rect x="200" y="0" width="90" height="32" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <text x="245" y="14" font-family="monospace" font-size="13" fill="#d2a8ff" text-anchor="middle" font-weight="700">2M+</text>
    <text x="245" y="27" font-family="monospace" font-size="8" fill="#8b949e" text-anchor="middle">token context</text>
  </g>

  <!-- Subtitle -->
  <text x="770" y="230" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">NVIDIA ICLR 2026 · First open-source implementation</text>
  <text x="770" y="252" font-family="system-ui, sans-serif" font-size="13" fill="#8b949e">PCA decorrelation + DP-optimal quantization + entropy coding</text>
  
  <!-- Accent line bottom -->
  <rect x="0" y="297" width="1200" height="3" fill="url(#accent)" rx="1"/>
</svg>